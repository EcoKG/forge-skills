name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Syntax check hooks
        run: |
          node -c forge/hooks/forge-gate-guard.js
          node -c forge/hooks/forge-tools.js
          node -c forge/hooks/forge-orchestrator.js
          node -c forge/hooks/forge-tracker.js

      - name: Validate pipeline.json
        run: node -e "JSON.parse(require('fs').readFileSync('forge/templates/pipeline.json','utf8')); console.log('pipeline.json: valid')"
